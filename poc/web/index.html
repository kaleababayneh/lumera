<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lumera AI — Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#000; --fg:#fff;
    --line:rgba(255,255,255,.10); --line-2:rgba(255,255,255,.20);
    --muted:rgba(255,255,255,.52); --dim:rgba(255,255,255,.34);
    --panel:#070707; --panel-2:#0c0c0c; --hover:rgba(255,255,255,.05);
    --live:#3fb950; --danger:#f0524d; --preview:#e0a93f; --info:#5aa6ff;
    --mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  *{box-sizing:border-box;border-radius:0}
  html,body{margin:0;background:var(--bg);color:var(--fg)}
  body{font:14px/1.55 "Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased;font-feature-settings:"rlig" 1,"calt" 1}
  ::selection{background:rgba(255,255,255,.22)}
  a{color:inherit;text-decoration:none}
  code,.mono{font-family:var(--mono)}
  .up{text-transform:uppercase;letter-spacing:.13em}
  ::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.16)}::-webkit-scrollbar-track{background:transparent}

  /* layout */
  .app{display:grid;grid-template-columns:250px 1fr;min-height:100vh}
  @media(max-width:780px){.app{grid-template-columns:1fr}.sidebar{display:none}}

  /* sidebar */
  .sidebar{border-right:1px solid var(--line);background:#020202;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .brand{display:flex;align-items:center;gap:11px;padding:20px 20px;border-bottom:1px solid var(--line)}
  .brand .mark{width:28px;height:28px;border:1px solid var(--line-2);display:grid;place-items:center;position:relative;overflow:hidden;flex:0 0 28px}
  .brand .mark::before{content:"";position:absolute;inset:4px;background:conic-gradient(from 0deg,#fff,rgba(255,255,255,.12),#fff);animation:spin 9s linear infinite}
  .brand .mark::after{content:"";position:absolute;inset:8px;background:#000}
  @keyframes spin{to{transform:rotate(360deg)}}
  .brand b{font-size:15px;letter-spacing:.02em;font-weight:700}
  .brand small{display:block;color:var(--dim);font-size:10px;font-weight:500;letter-spacing:.12em}
  .nav{padding:12px 12px;flex:1;overflow:auto}
  .nav .grp{font-size:9.5px;color:var(--dim);letter-spacing:.16em;padding:14px 10px 7px}
  .nav a{display:flex;align-items:center;gap:11px;padding:9px 11px;color:var(--muted);font-size:13px;font-weight:500;border:1px solid transparent;margin-bottom:2px}
  .nav a:hover{background:var(--hover);color:#fff}
  .nav a.active{background:var(--panel-2);color:#fff;border-color:var(--line)}
  .nav a .ic{width:17px;text-align:center;opacity:.85}
  .nav a .ct{margin-left:auto;font-size:10px;color:var(--dim);border:1px solid var(--line);padding:1px 6px;font-variant-numeric:tabular-nums}
  .sidefoot{border-top:1px solid var(--line);padding:14px 18px;font-size:11px;color:var(--muted)}
  .sidefoot .row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
  .dot{width:7px;height:7px;background:var(--live);border-radius:50%;animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(63,185,80,.5)}70%{box-shadow:0 0 0 6px rgba(63,185,80,0)}100%{box-shadow:0 0 0 0 rgba(63,185,80,0)}}

  /* topbar */
  .topbar{height:60px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 26px;position:sticky;top:0;background:rgba(0,0,0,.7);backdrop-filter:blur(12px);z-index:30}
  .topbar h1{font-size:16px;font-weight:650;margin:0;letter-spacing:-.01em}
  .topbar .crumb{color:var(--dim);font-size:12px;margin-top:1px}
  .topbar .right{display:flex;align-items:center;gap:10px}
  .chip{display:flex;align-items:center;gap:8px;border:1px solid var(--line);padding:7px 12px;font-size:12px;color:var(--muted)}
  .chip b{color:#fff;font-weight:600;font-variant-numeric:tabular-nums}

  .content{min-width:0;background:radial-gradient(ellipse 60% 36% at 60% -8%,rgba(255,255,255,.05),transparent 70%)}
  main{padding:26px;max-width:1180px}

  /* primitives */
  .card{border:1px solid var(--line);background:var(--panel)}
  .card .h{padding:13px 16px;border-bottom:1px solid var(--line);font-size:11px;color:var(--muted);display:flex;justify-content:space-between;align-items:center;gap:10px}
  .card .b{padding:16px}
  .grid{display:grid;gap:16px}
  .g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
  @media(max-width:900px){.g3,.g4{grid-template-columns:repeat(2,1fr)}.g2{grid-template-columns:1fr}}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .spread{display:flex;justify-content:space-between;align-items:center;gap:12px}

  button,.btn{font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer;border:1px solid var(--line-2);background:transparent;color:#fff;padding:10px 16px;transition:.14s;letter-spacing:.03em;white-space:nowrap}
  button:hover,.btn:hover{background:var(--hover);border-color:rgba(255,255,255,.36)}
  button:disabled{opacity:.4;cursor:not-allowed}
  .btn-primary{background:#fff;color:#000;border-color:#fff}.btn-primary:hover{background:rgba(255,255,255,.86);color:#000}
  .btn-sm{padding:8px 12px;font-size:11.5px}
  .btn-danger{border-color:rgba(240,82,77,.45);color:#ff8a86}.btn-danger:hover{background:rgba(240,82,77,.1)}

  input,select,textarea{font-family:inherit;font-size:13px;background:#000;color:#fff;border:1px solid var(--line-2);padding:10px 12px;width:100%}
  input:focus,select,textarea:focus{outline:none;border-color:rgba(255,255,255,.4)}
  label{font-size:11px;color:var(--muted);display:block;margin-bottom:6px}
  .field{margin-bottom:14px}

  /* kpi */
  .kpi{border:1px solid var(--line);background:var(--panel);padding:16px;position:relative}
  .kpi .v{font-size:24px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.01em}
  .kpi .v small{font-size:13px;color:var(--dim);font-weight:500}
  .kpi .l{font-size:10.5px;color:var(--dim);margin-top:6px}
  .tag{position:absolute;top:11px;right:11px;font-size:8px;font-weight:700;letter-spacing:.1em;padding:2px 5px;border:1px solid}
  .tag.live{color:var(--live);border-color:rgba(63,185,80,.4)}
  .tag.soon{color:var(--preview);border-color:rgba(224,169,63,.4)}

  /* pills, tiers, badges */
  .pill{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;font-size:10.5px;font-weight:600;border:1px solid var(--line-2)}
  .pill.ok{color:var(--live);border-color:rgba(63,185,80,.4)}
  .pill.warn{color:var(--preview);border-color:rgba(224,169,63,.4)}
  .pill.no{color:var(--danger);border-color:rgba(240,82,77,.4)}
  .pill.idle{color:var(--dim)}
  .badge-live{font-size:9.5px;font-weight:700;letter-spacing:.12em;padding:3px 8px;border:1px solid rgba(63,185,80,.4);color:var(--live);display:inline-flex;gap:6px;align-items:center}
  .badge-soon{font-size:9.5px;font-weight:700;letter-spacing:.12em;padding:3px 8px;border:1px solid rgba(224,169,63,.4);color:var(--preview)}
  .tier{font-size:9.5px;font-weight:700;letter-spacing:.07em;padding:3px 7px;border:1px solid;white-space:nowrap}
  .tier.PLATINUM{color:#e6e6fa;border-color:rgba(230,230,250,.5)} .tier.GOLD{color:#e8c46b;border-color:rgba(232,196,107,.5)}
  .tier.SILVER{color:#cbd5e1;border-color:rgba(203,213,225,.5)} .tier.BRONZE{color:#c08457;border-color:rgba(192,132,87,.5)}
  .tier.NONE{color:var(--dim);border-color:var(--line)}

  .kv{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-top:1px solid var(--line);font-size:12.5px}
  .kv:first-child{border-top:none}.kv .k{color:var(--muted)}.kv .v{text-align:right;word-break:break-all;font-variant-numeric:tabular-nums}
  .kv .v.mono{font-family:var(--mono);font-size:11px}
  .hint{color:var(--dim);font-size:11.5px;line-height:1.55}

  /* gauge / split */
  .gauge{height:16px;border:1px solid var(--line);display:flex;margin:6px 0 8px}
  .gauge .bonded{background:linear-gradient(90deg,rgba(255,255,255,.85),rgba(255,255,255,.5))}
  .gauge .slashed{background:repeating-linear-gradient(45deg,var(--danger),var(--danger) 4px,rgba(240,82,77,.55) 4px,rgba(240,82,77,.55) 8px)}
  .split{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}
  .split .seg{border:1px solid var(--line);padding:9px;text-align:center}
  .split .seg .sl{font-size:9px;color:var(--dim);letter-spacing:.05em}
  .split .seg b{display:block;font-size:13px;margin-top:3px;font-variant-numeric:tabular-nums}
  .split .burn b{color:var(--danger)}.split .ins b{color:#fff}.split .treas b{color:var(--preview)}

  /* tool cards */
  .tools{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  @media(max-width:900px){.tools{grid-template-columns:repeat(2,1fr)}}@media(max-width:560px){.tools{grid-template-columns:1fr}}
  .tool{border:1px solid var(--line);background:var(--panel);padding:16px;transition:.14s;cursor:pointer;display:flex;flex-direction:column}
  .tool:hover{border-color:var(--line-2);background:var(--panel-2);transform:translateY(-2px)}
  .tool .top{display:flex;justify-content:space-between;align-items:flex-start}
  .tool .ic{width:34px;height:34px;border:1px solid var(--line-2);display:grid;place-items:center;font-size:16px}
  .tool h3{font-size:14.5px;font-weight:650;margin:11px 0 2px}
  .tool .pub{font-size:10px;color:var(--dim);font-family:var(--mono)}
  .tool .desc{font-size:11.5px;color:var(--muted);margin:9px 0 12px;flex:1}
  .tool .foot{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--line);padding-top:11px}
  .tool .price{font-size:12px;font-weight:600;font-variant-numeric:tabular-nums}.tool .price span{color:var(--dim);font-weight:400;font-size:10px}
  .cat-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
  .cat{font-size:11.5px;padding:6px 12px;border:1px solid var(--line);color:var(--muted);cursor:pointer}
  .cat:hover{border-color:var(--line-2);color:#fff}.cat.on{background:#fff;color:#000;border-color:#fff}

  /* table */
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th{text-align:left;color:var(--dim);font-weight:600;font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:10px 12px;border-bottom:1px solid var(--line)}
  td{padding:12px;border-bottom:1px solid var(--line);font-variant-numeric:tabular-nums}
  tr:hover td{background:var(--hover)}
  .rank{color:var(--dim);font-family:var(--mono)}

  /* feed */
  .feed .it{display:flex;gap:12px;padding:12px 0;border-top:1px solid var(--line)}
  .feed .it:first-child{border-top:none}
  .feed .fic{width:30px;height:30px;border:1px solid var(--line);display:grid;place-items:center;font-size:14px;flex:0 0 30px}
  .feed .ft{font-size:12.5px;font-weight:550}.feed .fs{font-size:11px;color:var(--dim);font-family:var(--mono);margin-top:2px;word-break:break-all}
  .feed .fm{margin-left:auto;font-size:10.5px;color:var(--dim);white-space:nowrap}

  /* vision cards */
  .vcard{border:1px solid var(--line);background:linear-gradient(180deg,var(--panel),#000);padding:18px;min-height:150px}
  .vcard .vh{display:flex;justify-content:space-between;margin-bottom:11px}.vcard .vic{font-size:20px}
  .vcard h3{font-size:14.5px;margin:0 0 7px}.vcard p{color:var(--muted);font-size:12px;margin:0}
  .vcard .mod{margin-top:11px;font-size:10px;color:var(--dim);font-family:var(--mono)}

  /* playground result */
  .result{border:1px solid var(--line);background:#000;padding:14px;font-family:var(--mono);font-size:12px;margin-top:12px;white-space:pre-wrap;word-break:break-all}
  .result .ok{color:var(--live)}

  /* toasts */
  #toasts{position:fixed;right:20px;bottom:20px;z-index:200;display:flex;flex-direction:column;gap:9px;max-width:380px}
  .toast{border:1px solid var(--line-2);background:#0a0a0a;padding:12px 14px;font-size:12.5px;animation:slidein .2s ease;display:flex;gap:10px}
  .toast.ok{border-color:rgba(63,185,80,.45)}.toast.bad{border-color:rgba(240,82,77,.45)}.toast.info{border-color:var(--line-2)}
  .toast .ti{font-weight:600}.toast .ts{color:var(--muted);font-size:11px;margin-top:2px;font-family:var(--mono);word-break:break-all}
  @keyframes slidein{from{transform:translateX(20px);opacity:0}to{transform:none;opacity:1}}
  .empty{color:var(--dim);font-size:12.5px;padding:24px;text-align:center;border:1px dashed var(--line)}
  .sub{color:var(--muted);font-size:12.5px;margin:-4px 0 18px}
  .banner{border:1px solid rgba(224,169,63,.4);background:rgba(224,169,63,.06);color:#f0d196;padding:12px 14px;font-size:12.5px;margin-bottom:16px}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="mark"></div>
      <div><b>LUMERA·AI</b><small>CONSOLE</small></div>
    </div>
    <nav class="nav" id="nav">
      <div class="grp up">Agent</div>
      <a data-route="" href="#/"><span class="ic">▦</span> Dashboard</a>
      <a data-route="marketplace" href="#/marketplace"><span class="ic">◳</span> Marketplace <span class="ct" id="navTools">0</span></a>
      <a data-route="wallet" href="#/wallet"><span class="ic">◇</span> Wallet</a>
      <div class="grp up">Publisher</div>
      <a data-route="publish" href="#/publish"><span class="ic">↑</span> Publish a tool</a>
      <a data-route="reputation" href="#/reputation"><span class="ic">★</span> Reputation</a>
      <div class="grp up">Network</div>
      <a data-route="disputes" href="#/disputes"><span class="ic">⚖</span> Disputes</a>
      <a data-route="activity" href="#/activity"><span class="ic">≡</span> Activity</a>
      <a data-route="vision" href="#/vision"><span class="ic">◌</span> Roadmap</a>
    </nav>
    <div class="sidefoot">
      <div class="row"><span class="dot" id="sideDot"></span> <span id="sideNet">connecting…</span></div>
      <div class="row" style="color:var(--dim)">block <span id="sideBlock" style="margin-left:auto;font-family:var(--mono)">—</span></div>
    </div>
  </aside>

  <div class="content">
    <header class="topbar">
      <div><h1 id="pageTitle">Dashboard</h1><div class="crumb" id="crumb">overview</div></div>
      <div class="right">
        <a class="chip" href="#/wallet">Agent <b id="topLac">—</b> LAC</a>
        <div class="chip"><span class="dot"></span><span id="topNet">local</span></div>
      </div>
    </header>
    <main id="view"></main>
  </div>
</div>
<div id="toasts"></div>

<script>
const $=s=>document.querySelector(s);
const el=id=>document.getElementById(id);
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function fmt(v){if(v==null||v==='?')return '—';const n=Number(String(v).replace(/[^0-9.-]/g,''));return isNaN(n)?v:n.toLocaleString();}
function fmtS(v){const n=Number(v||0);if(n>=1e6)return (n/1e6).toFixed(2).replace(/\.?0+$/,'')+'M';if(n>=1e3)return (n/1e3).toFixed(1).replace(/\.0$/,'')+'k';return n.toLocaleString();}
function shortA(a){return a&&a.length>16?a.slice(0,10)+'…'+a.slice(-5):(a||'—');}
function shortId(a){return a&&a.length>22?a.slice(0,12)+'…'+a.slice(-6):(a||'—');}
const TIERS=['NONE','BRONZE','SILVER','GOLD','PLATINUM'];
function tierName(t){return (t||'NONE').replace('BADGE_TIER_','');}
function tierChip(t){const c=tierName(t);return `<span class="tier ${TIERS.includes(c)?c:'NONE'}">${c}</span>`;}

// ---- global state ----
let S={}, C={}, peakTier=null;
let activity=[
  {ic:'⬡',k:'ok',t:'Tool published',s:'pubtool · bond 2,000,000 ulume',m:'seed'},
  {ic:'✦',k:'ok',t:'Call settled',s:'publisher paid 800,000 ulac',m:'seed'},
  {ic:'★',k:'info',t:'Reputation evaluated',s:'pubtool → PLATINUM',m:'seed'},
];
function pushAct(a){a.m=a.m||'now';activity.unshift(a);if(activity.length>40)activity.pop();}

// ---- mock catalog (the "full vision") ----
const MOCK=[
  {id:'atlas-7b',cat:'LLM',ic:'◆',desc:'Open 7B chat + tool-use model.',tier:'PLATINUM',score:9420,price:'1.2',unit:'call',calls:'48.2k',success:'99.6%'},
  {id:'orion-70b',cat:'LLM',ic:'◆',desc:'Frontier 70B reasoning model.',tier:'GOLD',score:8810,price:'6.0',unit:'call',calls:'12.9k',success:'99.1%'},
  {id:'vision-diffuse',cat:'Image',ic:'❖',desc:'Text-to-image diffusion, 1024² + upscale.',tier:'GOLD',score:8650,price:'4.0',unit:'image',calls:'30.1k',success:'98.7%'},
  {id:'web-retriever',cat:'Search',ic:'◈',desc:'Live web search + clean extraction.',tier:'SILVER',score:7720,price:'0.5',unit:'query',calls:'88.4k',success:'97.9%'},
  {id:'gpu-render',cat:'Compute',ic:'▣',desc:'A100 GPU jobs, proven via x/action.',tier:'GOLD',score:8990,price:'12',unit:'min',calls:'4.1k',success:'99.9%'},
  {id:'oracle-feed',cat:'Data',ic:'◉',desc:'Real-time market + on-chain feeds.',tier:'PLATINUM',score:9510,price:'0.2',unit:'tick',calls:'210k',success:'99.99%'},
  {id:'whisper-stt',cat:'Audio',ic:'◐',desc:'Speech-to-text, 90+ languages.',tier:'SILVER',score:7610,price:'0.3',unit:'min',calls:'19.7k',success:'98.2%'},
  {id:'embed-lg',cat:'Data',ic:'⊞',desc:'High-dimensional text embeddings.',tier:'GOLD',score:8430,price:'0.05',unit:'1k tok',calls:'140k',success:'99.8%'},
  {id:'code-fix',cat:'LLM',ic:'◆',desc:'Code review + patch generation.',tier:'BRONZE',score:6240,price:'2.0',unit:'call',calls:'6.3k',success:'95.4%'},
];
const CATS=['All','Demo','LLM','Image','Search','Compute','Data','Audio'];
const VISION=[
  {ic:'🛡️',t:'SGX hardware attestation',d:'Every Proof-of-Service receipt backed by a TEE enclave quote — tamper-proof execution, not just a signature.',mod:'Phase-2 · EnclaveQuote'},
  {ic:'🔗',t:'Composable workflows',d:'Chain tools into verifiable multi-step pipelines and settle the whole DAG atomically.',mod:'x/workflows'},
  {ic:'⛑️',t:'Insurance & claims',d:'Slashed bonds fund an insurance pool; harmed users file on-chain claims for restitution.',mod:'x/insurance'},
  {ic:'🌉',t:'Cross-chain calls (IBC)',d:'Discover and call tools on any IBC-connected chain; settle in your home asset.',mod:'IBC v10 · ibc_action'},
  {ic:'🪪',t:'Agent identity',d:'Portable agent IDs + scoped session keys with spend limits and policy-gated access.',mod:'x/lumeraid'},
  {ic:'📊',t:'Analytics & billing',d:'Per-tool revenue, call volume, latency SLOs and usage-based invoicing.',mod:'metrics · receipts'},
];
// the live, on-chain tool (merged with chain state at render time)
function liveTool(){return {id:C.tool||'pubtool',cat:'Demo',ic:'⬡',desc:'Demo tool on the local chain — metered, proven (BLAKE3 PoS) and settled on every call.',tier:tierName(S.badgeTier),score:S.badgeScore||0,price:'0.8',unit:'call',calls:'live',success:'live',owner:S.toolOwner||C.publisher,live:true,registered:!!S.toolOwner};}
function allTools(){return [liveTool(),...MOCK];}

// ---- toasts ----
function toast(title,sub,kind){const d=document.createElement('div');d.className='toast '+(kind||'info');
  d.innerHTML=`<div><div class="ti">${esc(title)}</div>${sub?`<div class="ts">${esc(sub)}</div>`:''}</div>`;
  el('toasts').appendChild(d);setTimeout(()=>{d.style.opacity='0';d.style.transition='.3s';setTimeout(()=>d.remove(),300);},4200);}

// ---- api ----
async function getJSON(u){return await (await fetch(u)).json();}
async function post(step,qs){return await (await fetch('/api/'+step+(qs?('?'+qs):''),{method:'POST'})).json();}

async function loadConfig(){try{C=await getJSON('/api/config');}catch(e){}}
async function refresh(){try{const s=await getJSON('/api/state');if(s.ok){S=s;
  const bt=tierName(S.badgeTier);if(bt!=='NONE'&&bt!=='UNSPECIFIED'){const i=TIERS.indexOf(bt);if(peakTier===null||i>TIERS.indexOf(peakTier))peakTier=bt;}
}}catch(e){}}

// ---- live (poll) — updates shell + present view elements without re-render ----
function set(id,v){const e=el(id);if(e)e.textContent=v;}
function setHTML(id,v){const e=el(id);if(e)e.innerHTML=v;}
function updateLive(){
  set('topLac',fmtS(S.agentLac));set('navTools',S.toolCount!=null?S.toolCount:'0');
  set('sideNet',C.chainId||'offline');set('topNet',C.chainId||'local');set('sideBlock',S._block||'live');

  // wallet
  set('wAgentLume',fmt(S.agentLume));set('wAgentLac',fmt(S.agentLac));set('wPubLume',fmt(S.publisherLume));
  set('wPubLac',fmt(S.publisherLac));set('wChlLume',fmt(S.challengerLume));set('wInsurance',fmt(S.insurancePool));
  // tool-detail bond/badge (if mounted)
  const b=el('tdBonded');if(b){const bonded=Number(S.bondBonded||0),sl=Number(S.bondSlashed||0),tot=bonded+sl||1;
    el('tdgB').style.width=(100*bonded/tot)+'%';el('tdgS').style.width=(100*sl/tot)+'%';
    set('tdBonded',fmt(bonded)+' ulume');set('tdSlashed',sl>0?fmt(sl)+' ulume':'0');
    setHTML('tdBadge',bt2(S.badgeTier,S.badgeScore));}
}
function bt2(t,score){const c=tierName(t);if(c==='NONE'||c==='UNSPECIFIED'||!c)return '<span class="pill idle">unrated</span>';
  let hint='';if(peakTier&&TIERS.indexOf(c)<TIERS.indexOf(peakTier))hint=` <span style="color:var(--danger)">↓ from ${peakTier}</span>`;
  return `${tierChip(t)} <span style="color:var(--dim)">score ${score||''}</span>${hint}`;}

// ================= router =================
function parseHash(){const h=(location.hash||'#/').replace(/^#\/?/,'');const [route,...rest]=h.split('/');return [route,rest.join('/')];}
function go(path){location.hash='#/'+path;}
function renderView(){
  const [route,param]=parseHash();
  document.querySelectorAll('#nav a').forEach(a=>a.classList.toggle('active',a.dataset.route===route));
  const [title,crumb]=TITLES[route]||TITLES[''];
  el('pageTitle').textContent=title;el('crumb').textContent=param&&route==='tool'?param:crumb;
  const v=(VIEWS[route]||vDashboard)(param);
  el('view').innerHTML=typeof v==='string'?v:v.html;
  if(v&&v.mount)v.mount();
  updateLive();
  el('view').scrollIntoView({block:'start'});
}

// ================= actions =================
async function doCall(inputId,resultId){
  const input=el(inputId)?el(inputId).value:'';
  const r=el(resultId);if(r)r.innerHTML='<div class="result">calling… lock → execute → prove → settle</div>';
  try{
    const d=await post('call','input='+encodeURIComponent(input));
    if(d.ok){
      if(r)r.innerHTML=`<div class="result"><span class="ok">✓ proven on-chain</span>
output:   ${esc(d.output)}
receipt:  ${esc(d.receiptId)}
paid:     ${esc(d.cost)} → ${esc(shortA(d.publisher))}
tx:       ${esc(d.txhash)}</div>`;
      toast('Call settled','publisher paid '+d.cost,'ok');
      pushAct({ic:'✦',k:'ok',t:'Call settled',s:'receipt '+shortId(d.receiptId)+' · paid '+d.cost});
    }else{ if(r)r.innerHTML=`<div class="result" style="color:var(--danger)">✗ ${esc(d.error||'failed')}</div>`; toast('Call failed',d.error||'','bad'); }
  }catch(e){ if(r)r.innerHTML=`<div class="result" style="color:var(--danger)">✗ ${esc(e)}</div>`; }
  await refresh();updateLive();
}
async function doAction(step,okTitle,icon,kind){
  const btn=event&&event.target;const old=btn?btn.textContent:'';if(btn){btn.disabled=true;btn.textContent='…';}
  try{
    const d=await post(step);
    if(d.ok){ toast(okTitle,d.note||'','ok'); pushAct({ic:icon||'•',k:kind||'ok',t:okTitle,s:(d.note||'').slice(0,72)});
      if(step==='resolve'&&d.slashAmount)pushAct({ic:'✂',k:'bad',t:'Bond slashed',s:fmt(d.slashAmount)+' → burn/insurance/treasury'});
    } else { toast(step+' failed',(d.tx&&d.tx.raw_log)||d.error||d.note||'','bad'); }
  }catch(e){ toast(step+' failed',String(e),'bad'); }
  if(btn){btn.disabled=false;btn.textContent=old;}
  await refresh();renderView();
}
async function doNoProof(){
  const r=el('npResult');if(r)r.innerHTML='<div class="result">attempting…</div>';
  // needs an active lock — create one first via a lock, then settle with a bogus receipt
  try{
    const lk=await post('lock');
    const d=await post('settle-noproof');
    if(d.rejected){ if(r)r.innerHTML='<div class="result"><span class="ok">✓ rejected by the chain</span> — '+esc((d.tx&&d.tx.raw_log)||'proof-of-service verification failed')+'</div>'; toast('Gate held','settlement without proof was rejected','ok'); }
    else { if(r)r.innerHTML='<div class="result" style="color:var(--danger)">⚠ not rejected</div>'; }
  }catch(e){ if(r)r.innerHTML='<div class="result" style="color:var(--danger)">✗ '+esc(e)+'</div>'; }
  await refresh();updateLive();
}

// ================= boot =================
async function boot(){
  await loadConfig();await refresh();
  el('view'); renderView();
  window.addEventListener('hashchange',renderView);
  setInterval(async()=>{await refresh();updateLive();},3000);
}
boot();
</script>

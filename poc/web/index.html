<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lumera AI — Console</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23000'/%3E%3Crect x='6' y='6' width='20' height='20' fill='none' stroke='%23fff' stroke-width='2'/%3E%3Crect x='12' y='12' width='8' height='8' fill='%23fff'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#000; --fg:#fff; --line:rgba(255,255,255,.10); --line-2:rgba(255,255,255,.20);
    --muted:rgba(255,255,255,.52); --dim:rgba(255,255,255,.34); --panel:#070707; --panel-2:#0c0c0c;
    --hover:rgba(255,255,255,.05); --live:#3fb950; --danger:#f0524d; --preview:#e0a93f;
    --mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  *{box-sizing:border-box;border-radius:0}
  html,body{margin:0;background:var(--bg);color:var(--fg)}
  body{font:14px/1.55 "Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased;font-feature-settings:"rlig" 1,"calt" 1}
  ::selection{background:rgba(255,255,255,.22)}
  a{color:inherit;text-decoration:none}
  code,.mono{font-family:var(--mono)}
  .up{text-transform:uppercase;letter-spacing:.13em}
  svg{display:block}
  ::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.16)}::-webkit-scrollbar-track{background:transparent}

  .app{display:grid;grid-template-columns:250px 1fr;min-height:100vh}
  .sidebar{border-right:1px solid var(--line);background:#020202;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;z-index:40}
  .brand{display:flex;align-items:center;gap:11px;padding:18px 20px;border-bottom:1px solid var(--line)}
  .brand .mark{width:28px;height:28px;border:1px solid var(--line-2);display:grid;place-items:center;position:relative;overflow:hidden;flex:0 0 28px}
  .brand .mark::before{content:"";position:absolute;inset:4px;background:conic-gradient(from 0deg,#fff,rgba(255,255,255,.12),#fff);animation:spin 9s linear infinite}
  .brand .mark::after{content:"";position:absolute;inset:8px;background:#000}
  @keyframes spin{to{transform:rotate(360deg)}}
  .brand b{font-size:15px;letter-spacing:.02em;font-weight:700}.brand small{display:block;color:var(--dim);font-size:10px;letter-spacing:.12em}
  .nav{padding:12px;flex:1;overflow:auto}
  .nav .grp{font-size:9.5px;color:var(--dim);letter-spacing:.16em;padding:14px 10px 7px}
  .nav a{display:flex;align-items:center;gap:11px;padding:9px 11px;color:var(--muted);font-size:13px;font-weight:500;border:1px solid transparent;margin-bottom:2px}
  .nav a:hover{background:var(--hover);color:#fff}.nav a.active{background:var(--panel-2);color:#fff;border-color:var(--line)}
  .nav a .ic{display:grid;place-items:center;opacity:.85}.nav a.active .ic{opacity:1}
  .nav a .ct{margin-left:auto;font-size:10px;color:var(--dim);border:1px solid var(--line);padding:1px 6px;font-variant-numeric:tabular-nums}
  .sidefoot{border-top:1px solid var(--line);padding:14px 18px;font-size:11px;color:var(--muted)}
  .sidefoot .row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
  .acctsel{padding-bottom:12px;margin-bottom:12px;border-bottom:1px solid var(--line)}
  .acctsel .acctaddr{color:var(--dim);font-size:10px;margin-top:7px;word-break:break-all}
  .dot{width:7px;height:7px;background:var(--live);border-radius:50%;animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(63,185,80,.5)}70%{box-shadow:0 0 0 6px rgba(63,185,80,0)}100%{box-shadow:0 0 0 0 rgba(63,185,80,0)}}

  /* custom dropdown */
  .dd{position:relative}
  .dd-trigger{width:100%;display:flex;align-items:center;gap:9px;padding:9px 10px;background:#000;border:1px solid var(--line-2);color:#fff;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:.14s}
  .dd-trigger:hover,.dd.open .dd-trigger{border-color:rgba(255,255,255,.42);background:var(--hover)}
  .dd-av{width:20px;height:20px;flex:0 0 20px;display:grid;place-items:center;font-size:10px;font-weight:700;background:linear-gradient(135deg,rgba(255,255,255,.9),rgba(255,255,255,.4));color:#000}
  .dd-lab{flex:1;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .dd-chev{color:var(--dim);transition:.2s}.dd.open .dd-chev{transform:rotate(180deg);color:#fff}
  .dd-menu{position:absolute;left:0;right:0;bottom:calc(100% + 7px);background:#0a0a0a;border:1px solid var(--line-2);display:none;z-index:80;max-height:320px;overflow:auto;box-shadow:0 -10px 34px rgba(0,0,0,.7)}
  .dd.open .dd-menu{display:block;animation:ddin .14s ease}
  @keyframes ddin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .dd-head{font-size:9px;color:var(--dim);letter-spacing:.16em;padding:9px 11px 5px}
  .dd-opt{display:flex;align-items:center;gap:9px;padding:9px 11px;font-size:12.5px;cursor:pointer;border-top:1px solid var(--line)}
  .dd-opt:hover{background:var(--hover)}.dd-opt.active{background:var(--panel-2)}
  .dd-opt .mk{width:6px;height:6px;flex:0 0 6px;border:1px solid var(--line-2)}.dd-opt.active .mk{background:var(--live);border-color:var(--live)}
  .dd-opt .nm{font-weight:600}.dd-opt .role{color:var(--dim);font-size:9.5px;margin-top:1px}.dd-opt .ad{margin-left:auto;color:var(--dim);font-size:9.5px;font-family:var(--mono)}

  .topbar{height:60px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 26px;position:sticky;top:0;background:rgba(0,0,0,.7);backdrop-filter:blur(12px);z-index:30}
  .topbar h1{font-size:16px;font-weight:650;margin:0}.topbar .crumb{color:var(--dim);font-size:12px;margin-top:1px}
  .topbar .right{display:flex;align-items:center;gap:10px}
  .hamb{display:none;background:none;border:1px solid var(--line);padding:7px;cursor:pointer}
  .chip{display:flex;align-items:center;gap:8px;border:1px solid var(--line);padding:7px 12px;font-size:12px;color:var(--muted)}
  .chip b{color:#fff;font-weight:600;font-variant-numeric:tabular-nums}
  .content{min-width:0;background:radial-gradient(ellipse 60% 36% at 60% -8%,rgba(255,255,255,.05),transparent 70%)}
  main{padding:26px;max-width:1180px}
  #offline{display:none;background:rgba(240,82,77,.12);border-bottom:1px solid rgba(240,82,77,.4);color:#ff9a96;font-size:12.5px;padding:9px 26px;text-align:center}
  #offline.show{display:block}

  .card{border:1px solid var(--line);background:var(--panel)}
  .card .h{padding:13px 16px;border-bottom:1px solid var(--line);font-size:11px;color:var(--muted);display:flex;justify-content:space-between;align-items:center;gap:10px}
  .card .b{padding:16px}
  .grid{display:grid;gap:16px}.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
  @media(max-width:900px){.g3,.g4{grid-template-columns:repeat(2,1fr)}.g2{grid-template-columns:1fr}}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.spread{display:flex;justify-content:space-between;align-items:center;gap:12px}
  button,.btn{font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer;border:1px solid var(--line-2);background:transparent;color:#fff;padding:10px 16px;transition:.14s;letter-spacing:.03em;white-space:nowrap;display:inline-flex;align-items:center;gap:7px}
  button:hover,.btn:hover{background:var(--hover);border-color:rgba(255,255,255,.36)}button:disabled{opacity:.4;cursor:not-allowed}
  .btn-primary{background:#fff;color:#000;border-color:#fff}.btn-primary:hover{background:rgba(255,255,255,.86);color:#000}
  .btn-sm{padding:8px 12px;font-size:11.5px}.btn-danger{border-color:rgba(240,82,77,.45);color:#ff8a86}.btn-danger:hover{background:rgba(240,82,77,.1)}
  input,select,textarea{font-family:inherit;font-size:13px;background:#000;color:#fff;border:1px solid var(--line-2);padding:10px 12px;width:100%}
  input:focus,select:focus,textarea:focus{outline:none;border-color:rgba(255,255,255,.4)}
  label{font-size:11px;color:var(--muted);display:block;margin-bottom:6px}.field{margin-bottom:14px}

  .kpi{border:1px solid var(--line);background:var(--panel);padding:16px;position:relative;overflow:hidden}
  .kpi .v{font-size:24px;font-weight:700;font-variant-numeric:tabular-nums}.kpi .v small{font-size:13px;color:var(--dim);font-weight:500}
  .kpi .l{font-size:10.5px;color:var(--dim);margin-top:6px}
  .kpi .spark{position:absolute;right:0;bottom:0;opacity:.5}
  .tag{position:absolute;top:11px;right:11px;font-size:8px;font-weight:700;letter-spacing:.1em;padding:2px 5px;border:1px solid;z-index:1}
  .tag.live{color:var(--live);border-color:rgba(63,185,80,.4)}.tag.soon{color:var(--preview);border-color:rgba(224,169,63,.4)}

  .pill{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;font-size:10.5px;font-weight:600;border:1px solid var(--line-2)}
  .pill.ok{color:var(--live);border-color:rgba(63,185,80,.4)}.pill.warn{color:var(--preview);border-color:rgba(224,169,63,.4)}
  .pill.no{color:var(--danger);border-color:rgba(240,82,77,.4)}.pill.idle{color:var(--dim)}
  .badge-live{font-size:9.5px;font-weight:700;letter-spacing:.12em;padding:3px 8px;border:1px solid rgba(63,185,80,.4);color:var(--live);display:inline-flex;gap:6px;align-items:center}
  .badge-soon{font-size:9.5px;font-weight:700;letter-spacing:.12em;padding:3px 8px;border:1px solid rgba(224,169,63,.4);color:var(--preview)}
  .tier{font-size:9.5px;font-weight:700;letter-spacing:.07em;padding:3px 7px;border:1px solid;white-space:nowrap}
  .tier.PLATINUM{color:#e6e6fa;border-color:rgba(230,230,250,.5)}.tier.GOLD{color:#e8c46b;border-color:rgba(232,196,107,.5)}
  .tier.SILVER{color:#cbd5e1;border-color:rgba(203,213,225,.5)}.tier.BRONZE{color:#c08457;border-color:rgba(192,132,87,.5)}.tier.NONE{color:var(--dim);border-color:var(--line)}
  .kv{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-top:1px solid var(--line);font-size:12.5px}
  .kv:first-child{border-top:none}.kv .k{color:var(--muted)}.kv .v{text-align:right;word-break:break-all;font-variant-numeric:tabular-nums}.kv .v.mono{font-family:var(--mono);font-size:11px}
  .hint{color:var(--dim);font-size:11.5px;line-height:1.6}.sub{color:var(--muted);font-size:12.5px;margin:-4px 0 18px}

  .gauge{height:16px;border:1px solid var(--line);display:flex;margin:6px 0 8px}
  .gauge .bonded{background:linear-gradient(90deg,rgba(255,255,255,.85),rgba(255,255,255,.5))}
  .gauge .slashed{background:repeating-linear-gradient(45deg,var(--danger),var(--danger) 4px,rgba(240,82,77,.55) 4px,rgba(240,82,77,.55) 8px)}
  .split{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}
  .split .seg{border:1px solid var(--line);padding:9px;text-align:center}.split .seg .sl{font-size:9px;color:var(--dim)}
  .split .seg b{display:block;font-size:13px;margin-top:3px;font-variant-numeric:tabular-nums}
  .split .burn b{color:var(--danger)}.split .ins b{color:#fff}.split .treas b{color:var(--preview)}

  .tools{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  @media(max-width:900px){.tools{grid-template-columns:repeat(2,1fr)}}@media(max-width:560px){.tools{grid-template-columns:1fr}}
  .tool{border:1px solid var(--line);background:var(--panel);padding:16px;transition:.14s;cursor:pointer;display:flex;flex-direction:column}
  .tool:hover{border-color:var(--line-2);background:var(--panel-2);transform:translateY(-2px)}
  .tool .top{display:flex;justify-content:space-between;align-items:flex-start}
  .tool .ic{width:34px;height:34px;border:1px solid var(--line-2);display:grid;place-items:center}
  .tool h3{font-size:14.5px;font-weight:650;margin:11px 0 2px}.tool .pub{font-size:10px;color:var(--dim);font-family:var(--mono)}
  .tool .desc{font-size:11.5px;color:var(--muted);margin:9px 0 12px;flex:1}
  .tool .foot{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--line);padding-top:11px}
  .tool .price{font-size:12px;font-weight:600;font-variant-numeric:tabular-nums}.tool .price span{color:var(--dim);font-weight:400;font-size:10px}
  .cat-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
  .cat{font-size:11.5px;padding:6px 12px;border:1px solid var(--line);color:var(--muted);cursor:pointer}
  .cat:hover{border-color:var(--line-2);color:#fff}.cat.on{background:#fff;color:#000;border-color:#fff}
  .search{position:relative;flex:1;min-width:180px}.search input{padding-left:34px}.search .si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--dim)}

  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th{text-align:left;color:var(--dim);font-weight:600;font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:10px 12px;border-bottom:1px solid var(--line)}
  td{padding:12px;border-bottom:1px solid var(--line);font-variant-numeric:tabular-nums}tr:hover td{background:var(--hover)}.rank{color:var(--dim);font-family:var(--mono)}

  .feed .it{display:flex;gap:12px;padding:12px 0;border-top:1px solid var(--line);align-items:flex-start}.feed .it:first-child{border-top:none}
  .feed .fic{width:30px;height:30px;border:1px solid var(--line);display:grid;place-items:center;flex:0 0 30px}
  .feed .ft{font-size:12.5px;font-weight:550}.feed .fs{font-size:11px;color:var(--dim);font-family:var(--mono);margin-top:2px;word-break:break-all}
  .feed .fm{margin-left:auto;font-size:10.5px;color:var(--dim);white-space:nowrap;text-align:right}
  .feed .fm a{color:var(--muted);cursor:pointer}.feed .fm a:hover{color:#fff}

  .vcard{border:1px solid var(--line);background:linear-gradient(180deg,var(--panel),#000);padding:18px;min-height:150px}
  .vcard .vh{display:flex;justify-content:space-between;margin-bottom:11px}.vcard h3{font-size:14.5px;margin:0 0 7px}.vcard p{color:var(--muted);font-size:12px;margin:0}.vcard .mod{margin-top:11px;font-size:10px;color:var(--dim);font-family:var(--mono)}

  .result{border:1px solid var(--line);background:#000;padding:14px;font-family:var(--mono);font-size:11.5px;margin-top:12px;white-space:pre-wrap;word-break:break-all}.result .ok{color:var(--live)}
  .skel{background:linear-gradient(90deg,rgba(255,255,255,.04),rgba(255,255,255,.09),rgba(255,255,255,.04));background-size:200% 100%;animation:sh 1.3s infinite}
  @keyframes sh{to{background-position:-200% 0}}
  .empty{color:var(--dim);font-size:12.5px;padding:26px;text-align:center;border:1px dashed var(--line)}
  .banner{border:1px solid rgba(224,169,63,.4);background:rgba(224,169,63,.06);color:#f0d196;padding:12px 14px;font-size:12.5px;margin-bottom:16px}

  #toasts{position:fixed;right:20px;bottom:20px;z-index:200;display:flex;flex-direction:column;gap:9px;max-width:380px}
  .toast{border:1px solid var(--line-2);background:#0a0a0a;padding:12px 14px;font-size:12.5px;animation:slidein .2s ease;display:flex;gap:10px}
  .toast.ok{border-color:rgba(63,185,80,.45)}.toast.bad{border-color:rgba(240,82,77,.45)}
  .toast .ti{font-weight:600}.toast .ts{color:var(--muted);font-size:11px;margin-top:2px;font-family:var(--mono);word-break:break-all}
  @keyframes slidein{from{transform:translateX(20px);opacity:0}to{transform:none;opacity:1}}

  #modal{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:20px}
  #modal.show{display:flex}
  .modal-card{width:560px;max-width:100%;max-height:88vh;overflow:auto;background:#070707;border:1px solid var(--line-2);box-shadow:0 20px 60px rgba(0,0,0,.7)}
  .modal-card .mh{display:flex;justify-content:space-between;align-items:center;padding:15px 18px;border-bottom:1px solid var(--line)}
  .modal-card .mh b{font-size:14px}.modal-card .mb{padding:18px}.modal-card .x{cursor:pointer;color:var(--muted)}.modal-card .x:hover{color:#fff}

  @media(max-width:780px){
    .app{grid-template-columns:1fr}
    .sidebar{position:fixed;left:0;top:0;width:250px;transform:translateX(-100%);transition:.2s}
    .sidebar.open{transform:none}
    .hamb{display:inline-flex}
  }
  .route-anim{animation:fade .22s ease}@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  #tourOv{position:fixed;inset:0;z-index:300;display:none}#tourOv.show{display:block}
  .tour-hole{position:fixed;border:1px solid rgba(255,255,255,.7);box-shadow:0 0 0 9999px rgba(0,0,0,.74);transition:.25s;pointer-events:none}
  .tour-pop{position:fixed;width:320px;max-width:90vw;background:#0b0b0b;border:1px solid var(--line-2);padding:16px;box-shadow:0 16px 44px rgba(0,0,0,.7)}
  .tour-step{font-size:9px;color:var(--dim)}.tour-t{font-size:15px;font-weight:650;margin:6px 0 7px}.tour-b{color:var(--muted);font-size:12.5px;line-height:1.55}
  .tour-nav{display:flex;justify-content:space-between;margin-top:15px}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand"><div class="mark"></div><div><b>LUMERA·AI</b><small>CONSOLE</small></div></div>
    <nav class="nav" id="nav">
      <div class="grp up">Agent</div>
      <a data-route="" href="#/"><span class="ic" data-ic="grid"></span> Dashboard</a>
      <a data-route="marketplace" href="#/marketplace"><span class="ic" data-ic="store"></span> Marketplace <span class="ct" id="navTools">0</span></a>
      <a data-route="agent" href="#/agent"><span class="ic" data-ic="zap"></span> Agent terminal</a>
      <a data-route="wallet" href="#/wallet"><span class="ic" data-ic="wallet"></span> Wallet</a>
      <div class="grp up">Publisher</div>
      <a data-route="publish" href="#/publish"><span class="ic" data-ic="upload"></span> Publish a tool</a>
      <a data-route="reputation" href="#/reputation"><span class="ic" data-ic="award"></span> Reputation</a>
      <div class="grp up">Network</div>
      <a data-route="graph" href="#/graph"><span class="ic" data-ic="activity"></span> Trust graph</a>
      <a data-route="disputes" href="#/disputes"><span class="ic" data-ic="scale"></span> Disputes</a>
      <a data-route="activity" href="#/activity"><span class="ic" data-ic="activity"></span> Activity</a>
      <a data-route="vision" href="#/vision"><span class="ic" data-ic="map"></span> Roadmap</a>
    </nav>
    <div class="sidefoot">
      <div class="acctsel">
        <label class="up" style="font-size:9px;letter-spacing:.16em;margin-bottom:6px">Acting as</label>
        <div class="dd" id="acctDD">
          <button class="dd-trigger" id="acctTrigger" onclick="toggleAcctMenu(event)">
            <span class="dd-av" id="acctAv">A</span><span class="dd-lab" id="acctLabel">acct1</span><span class="dd-chev" data-ic="chevron-down"></span>
          </button>
          <div class="dd-menu" id="acctMenu"></div>
        </div>
        <div class="acctaddr mono" id="acctAddr">—</div>
      </div>
      <div class="row"><span class="dot" id="sideDot"></span> <span id="sideNet">connecting…</span></div>
      <div class="row" style="color:var(--dim)">block <span id="sideBlock" style="margin-left:auto;font-family:var(--mono)">—</span></div>
    </div>
  </aside>

  <div class="content">
    <header class="topbar">
      <div class="row" style="gap:14px">
        <button class="hamb" onclick="el('sidebar').classList.toggle('open')" data-ic="menu"></button>
        <div><h1 id="pageTitle">Dashboard</h1><div class="crumb" id="crumb">overview</div></div>
      </div>
      <div class="right">
        <button class="btn-sm" onclick="startTour()" title="Guided walkthrough">▷ Guided tour</button>
        <a class="chip" href="#/wallet"><b id="topAcct">—</b> · <b id="topLac">—</b> LAC</a>
        <div class="chip"><span class="dot"></span><span id="topNet">local</span></div>
      </div>
    </header>
    <div id="offline">⚠ Node unreachable — is <code>lumerad</code> running? Reconnecting…</div>
    <main id="view"></main>
  </div>
</div>
<div id="toasts"></div>
<div id="modal" onclick="if(event.target.id==='modal')closeModal()"><div class="modal-card" id="modalCard"></div></div>

<script>
const el=id=>document.getElementById(id);
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function fmt(v){if(v==null||v==='?')return '—';const n=Number(String(v).replace(/[^0-9.-]/g,''));return isNaN(n)?v:n.toLocaleString();}
function fmtS(v){const n=Number(v||0);if(n>=1e6)return (n/1e6).toFixed(2).replace(/\.?0+$/,'')+'M';if(n>=1e3)return (n/1e3).toFixed(1).replace(/\.0$/,'')+'k';return n.toLocaleString();}
function shortA(a){return a&&a.length>16?a.slice(0,10)+'…'+a.slice(-5):(a||'—');}
function shortId(a){return a&&a.length>22?a.slice(0,12)+'…'+a.slice(-6):(a||'—');}
function ago(t){if(!t)return '';const s=Math.max(0,Math.floor(Date.now()/1000-t));if(s<60)return s+'s ago';if(s<3600)return Math.floor(s/60)+'m ago';return Math.floor(s/3600)+'h ago';}
const TIERS=['NONE','BRONZE','SILVER','GOLD','PLATINUM'];
function tierName(t){return (t||'NONE').replace('BADGE_TIER_','');}
function tierChip(t){const c=tierName(t);return `<span class="tier ${TIERS.includes(c)?c:'NONE'}">${c}</span>`;}

// ---- icons (lucide subset, inline SVG) ----
const ICONS={
  grid:'<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>',
  store:'<path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/>',
  wallet:'<rect width="20" height="14" x="2" y="5" rx="0"/><line x1="2" x2="22" y1="10" y2="10"/>',
  upload:'<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/>',
  award:'<circle cx="12" cy="8" r="6"/><path d="M15.5 13 17 22l-5-3-5 3 1.5-9"/>',
  scale:'<path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"/>',
  activity:'<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>',
  map:'<polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" x2="9" y1="3" y2="18"/><line x1="15" x2="15" y1="6" y2="21"/>',
  search:'<circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>',
  'chevron-down':'<path d="m6 9 6 6 6-6"/>',
  x:'<path d="M18 6 6 18"/><path d="m6 6 12 12"/>',
  check:'<path d="M20 6 9 17l-5-5"/>',
  shield:'<path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/>',
  zap:'<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>',
  arrow:'<path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>',
  plus:'<path d="M5 12h14"/><path d="M12 5v14"/>',
  minus:'<path d="M5 12h14"/>',
  menu:'<line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="18" y2="18"/>',
  link:'<path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>',
};
function svg(name,size){return `<svg viewBox="0 0 24 24" width="${size||16}" height="${size||16}" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS[name]||''}</svg>`;}
function paintIcons(root){(root||document).querySelectorAll('[data-ic]').forEach(e=>{e.innerHTML=svg(e.dataset.ic, e.classList.contains('si')?15:16);});}
// deterministic sparkline from a seed
function spark(seed,w,h){let x=seed*9301%50/50;const pts=[];for(let i=0;i<14;i++){x=(x*1.7+ (i*seed%7)/7)%1;pts.push(0.25+0.6*x);}const W=w||64,H=h||26;const d=pts.map((p,i)=>`${(i/(pts.length-1)*W).toFixed(1)},${(H-p*H).toFixed(1)}`).join(' ');
  return `<svg class="spark" width="${W}" height="${H}"><polyline points="${d}" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="1.5"/></svg>`;}
// deterministic demo series
function series(seed,n,base,amp){const out=[];for(let i=0;i<n;i++){out.push(base+amp*(0.45+0.45*((Math.sin(i*0.55+seed)+1)/2))+amp*0.12*(((i*seed)%5)/5));}return out;}
function lineChart(data,w,h,color){if(!data.length)return '';const mn=Math.min(...data),mx=Math.max(...data),rng=(mx-mn)||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1)*w).toFixed(1)},${(h-((v-mn)/rng)*(h-8)-4).toFixed(1)}`);
  return `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="display:block">
    <polygon points="0,${h} ${pts.join(' ')} ${w},${h}" fill="${color?color.replace(')',',.10)').replace('rgb','rgba'):'rgba(255,255,255,.07)'}"/>
    <polyline points="${pts.join(' ')}" fill="none" stroke="${color||'rgba(255,255,255,.8)'}" stroke-width="1.6"/></svg>`;}
function barChart(items,w,h){const mx=Math.max(...items.map(i=>i.value),1);const bw=w/items.length;
  return `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="display:block">
    ${items.map((it,i)=>{const bh=Math.max(2,(it.value/mx)*(h-3));return `<rect x="${(i*bw+bw*0.2).toFixed(1)}" y="${(h-bh).toFixed(1)}" width="${(bw*0.6).toFixed(1)}" height="${bh.toFixed(1)}" fill="${it.color||'rgba(255,255,255,.5)'}"/>`;}).join('')}</svg>`;}

// ---- account ----
let account=localStorage.getItem('lumera.account')||'acct1';
function acctParam(){return account?('account='+encodeURIComponent(account)):'';}
function withTool(qs){return [qs,acctParam(),focusTool?('tool='+encodeURIComponent(focusTool)):''].filter(Boolean).join('&');}
async function getJSON(u){const q=withTool('');const sep=u.includes('?')?'&':'?';return await (await fetch(u+(q?sep+q:''))).json();}
async function post(step,qs){const q=withTool(qs);return await (await fetch('/api/'+step+(q?('?'+q):''),{method:'POST'})).json();}

let ACCOUNTS=[];
function acctRole(n){return n==='val'?'agent · supernode':'test account';}
function acctAvatar(n){return n==='val'?'V':(n.replace('acct','')||n[0]).toUpperCase();}
async function loadAccounts(){try{const d=await (await fetch('/api/accounts')).json();ACCOUNTS=d.accounts||[];
  if(!ACCOUNTS.some(a=>a.name===account))account=d.default||'acct1';renderAcctMenu();setAcctTrigger();}catch(e){}}
function renderAcctMenu(){const m=el('acctMenu');if(!m)return;m.innerHTML='<div class="dd-head up">Switch account</div>'+ACCOUNTS.map(a=>`
  <div class="dd-opt ${a.name===account?'active':''}" onclick="selectAccount('${a.name}')"><span class="mk"></span>
  <div><div class="nm">${esc(a.name)}</div><div class="role">${acctRole(a.name)}</div></div><span class="ad">${shortA(a.address)}</span></div>`).join('');}
function setAcctTrigger(){const a=ACCOUNTS.find(x=>x.name===account);if(el('acctLabel'))el('acctLabel').textContent=account;
  if(el('acctAv'))el('acctAv').textContent=acctAvatar(account);if(el('acctAddr'))el('acctAddr').textContent=a?shortA(a.address):'—';}
function toggleAcctMenu(ev){ev.stopPropagation();el('acctDD').classList.toggle('open');}
function closeAcctMenu(){const dd=el('acctDD');if(dd)dd.classList.remove('open');}
async function selectAccount(name){account=name;localStorage.setItem('lumera.account',name);closeAcctMenu();renderAcctMenu();setAcctTrigger();
  toast('Switched account','now acting as '+name,'info');await refresh();renderView();}

// ---- data ----
let S={},C={},peakTier=null,TOOLS=[],ACTIVITY=[],focusTool='';
const MOCK=[
  {id:'atlas-7b',cat:'LLM',ic:'zap',desc:'Open 7B chat + tool-use model.',tier:'PLATINUM',score:9420,price:'1.2',unit:'call',calls:'48.2k',success:'99.6%'},
  {id:'vision-diffuse',cat:'Image',ic:'zap',desc:'Text-to-image diffusion, 1024².',tier:'GOLD',score:8650,price:'4.0',unit:'image',calls:'30.1k',success:'98.7%'},
  {id:'web-retriever',cat:'Search',ic:'search',desc:'Live web search + clean extraction.',tier:'SILVER',score:7720,price:'0.5',unit:'query',calls:'88.4k',success:'97.9%'},
  {id:'gpu-render',cat:'Compute',ic:'zap',desc:'A100 GPU jobs, proven via x/action.',tier:'GOLD',score:8990,price:'12',unit:'min',calls:'4.1k',success:'99.9%'},
  {id:'oracle-feed',cat:'Data',ic:'activity',desc:'Real-time market + on-chain feeds.',tier:'PLATINUM',score:9510,price:'0.2',unit:'tick',calls:'210k',success:'99.99%'},
  {id:'whisper-stt',cat:'Audio',ic:'activity',desc:'Speech-to-text, 90+ languages.',tier:'SILVER',score:7610,price:'0.3',unit:'min',calls:'19.7k',success:'98.2%'},
];
const CATS=['All','Live','LLM','Image','Search','Compute','Data','Audio'];
const VISION=[
  {ic:'shield',t:'SGX hardware attestation',d:'Every receipt backed by a TEE enclave quote — tamper-proof execution, not just a signature.',mod:'Phase-2 · EnclaveQuote'},
  {ic:'link',t:'Composable workflows',d:'Chain tools into verifiable pipelines and settle the whole DAG atomically.',mod:'x/workflows'},
  {ic:'shield',t:'Insurance & claims',d:'Slashed bonds fund a pool; harmed users file on-chain claims for restitution.',mod:'x/insurance'},
  {ic:'link',t:'Cross-chain calls (IBC)',d:'Discover and call tools on any IBC-connected chain; settle in your home asset.',mod:'IBC v10'},
  {ic:'award',t:'Agent identity',d:'Portable agent IDs + scoped session keys with spend limits and policy-gated access.',mod:'x/lumeraid'},
  {ic:'activity',t:'Analytics & billing',d:'Per-tool revenue, call volume, latency SLOs and usage-based invoicing.',mod:'metrics · receipts'},
];
// merge real on-chain tools with mock previews for the marketplace
function marketTools(){
  const live=TOOLS.map(t=>({id:t.id,cat:'Live',ic:t.id==='oracle-feed'?'activity':'shield',live:true,owner:t.owner,tier:tierName(t.tier),score:t.score||0,price:'0.8',unit:'call',bonded:t.bonded,real:t.id==='oracle-feed',
    desc:t.id==='oracle-feed'?'Live crypto spot price via Coinbase — GENUINE verifiable execution of a real external fetch.':'On-chain tool — metered, proven (BLAKE3 PoS) and settled on every call.'}));
  const liveIds=new Set(live.map(t=>t.id));
  return [...live,...MOCK.filter(m=>!liveIds.has(m.id))];
}
function findTool(id){return marketTools().find(t=>t.id===id);}

async function loadConfig(){try{C=await (await fetch('/api/config')).json();if(!focusTool)focusTool=C.tool||'pubtool';}catch(e){}}
async function loadTools(){try{const d=await getJSON('/api/tools');TOOLS=d.tools||[];}catch(e){}}
async function loadActivity(){try{const d=await getJSON('/api/activity');ACTIVITY=d.items||[];}catch(e){}}
let online=true;
async function refresh(){try{const s=await getJSON('/api/state');online=!!(s&&s.ok);el('offline').classList.toggle('show',!online);
  if(s&&s.ok){S=s;const bt=tierName(S.badgeTier);if(bt!=='NONE'&&bt!=='UNSPECIFIED'){const i=TIERS.indexOf(bt);if(peakTier===null||i>TIERS.indexOf(peakTier))peakTier=bt;}}}
  catch(e){online=false;el('offline').classList.add('show');}}

function set(id,v){const e=el(id);if(e)e.textContent=v;}
function setHTML(id,v){const e=el(id);if(e)e.innerHTML=v;}
function bt2(t,score){const c=tierName(t);if(c==='NONE'||c==='UNSPECIFIED'||!c)return '<span class="pill idle">unrated</span>';
  let hint='';if(peakTier&&TIERS.indexOf(c)<TIERS.indexOf(peakTier))hint=` <span style="color:var(--danger)">↓ from ${peakTier}</span>`;
  return `${tierChip(t)} <span style="color:var(--dim)">score ${score||''}</span>${hint}`;}
function updateLive(){
  set('topAcct',S.agent||account);set('topLac',fmtS(S.agentLac));set('navTools',S.toolCount!=null?S.toolCount:'0');
  set('sideNet',C.chainId||'offline');set('topNet',C.chainId||'local');set('sideBlock',S.blockHeight||'—');
  set('kpiTools',S.toolCount!=null?S.toolCount:'—');set('kpiSettled',fmtS(S.publisherLac));set('kpiInsurance',fmtS(S.insurancePool));set('kpiLac',fmtS(S.agentLac));
  set('kpiCalls',fmtS(S.networkCalls));set('kpiGmv',fmtS(S.networkGmv));set('kpiAgents',S.networkAgents!=null?S.networkAgents:'—');
  set('wAcctName',S.agent||account);set('wAgentAddr',shortA(S.agentAddr));set('wAgentLume',fmt(S.agentLume));set('wAgentLac',fmt(S.agentLac));
  set('wPubLume',fmt(S.publisherLume));set('wPubLac',fmt(S.publisherLac));set('wChlLume',fmt(S.challengerLume));set('wInsurance',fmt(S.insurancePool));
  const b=el('tdBonded');if(b){const bonded=Number(S.bondBonded||0),sl=Number(S.bondSlashed||0),tot=bonded+sl||1;
    el('tdgB').style.width=(100*bonded/tot)+'%';el('tdgS').style.width=(100*sl/tot)+'%';
    set('tdBonded',fmt(bonded)+' ulume');set('tdSlashed',sl>0?fmt(sl)+' ulume':'0');setHTML('tdBadge',bt2(S.badgeTier,S.badgeScore));}
  if(el('dashFeed'))setHTML('dashFeed',feedHTML(ACTIVITY.slice(0,5)));
  if(el('actFeed'))setHTML('actFeed',ACTIVITY.length?feedHTML(ACTIVITY):'<div class="empty">No activity yet — call a tool or publish one.</div>');
}

// ================= toasts / modal =================
function toast(t,s,k){const d=document.createElement('div');d.className='toast '+(k||'info');d.innerHTML=`<div><div class="ti">${esc(t)}</div>${s?`<div class="ts">${esc(s)}</div>`:''}</div>`;el('toasts').appendChild(d);setTimeout(()=>{d.style.opacity='0';d.style.transition='.3s';setTimeout(()=>d.remove(),300);},4200);}
function closeModal(){el('modal').classList.remove('show');}
async function openReceipt(id,known){
  el('modal').classList.add('show');
  el('modalCard').innerHTML=`<div class="mh"><b>Proof-of-Service receipt</b><span class="x" data-ic="x" onclick="closeModal()"></span></div><div class="mb"><div class="result">loading…</div></div>`;
  paintIcons(el('modalCard'));
  let r={};try{const d=await getJSON('/api/receipt?id='+encodeURIComponent(id));r=d.receipt||{};}catch(e){}
  const verifyBtn=known?`<button class="btn-primary btn-sm" onclick='verifyReceipt(${JSON.stringify(known).replace(/'/g,"&#39;")})'>Re-derive &amp; verify</button>`:'';
  el('modalCard').innerHTML=`<div class="mh"><b>Proof-of-Service receipt</b><span class="x" data-ic="x" onclick="closeModal()"></span></div>
  <div class="mb">
    <div class="kv"><span class="k">Receipt id</span><span class="v mono">${shortId(id)}</span></div>
    <div class="kv"><span class="k">Status</span><span class="v"><span class="pill ${r.status==='attested'?'ok':r.status==='disputed'?'warn':r.status?'no':'idle'}">${esc(r.status||'unknown')}</span></span></div>
    <div class="kv"><span class="k">Tool</span><span class="v mono">${esc(r.tool_id||'—')}</span></div>
    <div class="kv"><span class="k">Lock</span><span class="v mono">${esc(r.lock_id||'—')}</span></div>
    <div class="kv"><span class="k">Request hash</span><span class="v mono">${shortId(r.request_hash||'—')}</span></div>
    <div class="kv"><span class="k">Trace hash</span><span class="v mono">${shortId(r.trace_hash||'—')}</span></div>
    <div class="kv"><span class="k">TEE enclave quote</span><span class="v">${r.enclave_quote?esc(shortId(r.enclave_quote)):'<span class="badge-soon">PHASE-2</span>'}</span></div>
    <div class="hint" style="margin:14px 0 10px">The receipt id is <code>pos1&lt;BLAKE3(input,model,output)&gt;</code>. ${known?'Re-derive it client-side to confirm it binds to this exact call:':'Inputs unknown for this receipt — only the on-chain hashes are shown.'}</div>
    ${verifyBtn}<div id="verifyOut"></div>
  </div>`;
  paintIcons(el('modalCard'));
}
async function verifyReceipt(k){
  const o=el('verifyOut');o.innerHTML='<div class="result">deriving…</div>';
  try{const d=await (await fetch('/api/derive-receipt?id='+encodeURIComponent(k.receiptId)+'&input='+encodeURIComponent(k.input)+'&model='+encodeURIComponent(k.model)+'&output='+encodeURIComponent(k.output),{method:'POST'})).json();
    o.innerHTML=`<div class="result">${d.matches?'<span class="ok">✓ verified — derived id matches the on-chain receipt</span>':'<span style="color:var(--danger)">✗ mismatch</span>'}
input:  ${esc(k.input)}
model:  ${esc(k.model)}
output: ${esc(k.output)}
derived:${esc(d.derived)}</div>`;
  }catch(e){o.innerHTML='<div class="result" style="color:var(--danger)">verify failed</div>';}
}

// ================= views =================
const TITLES={'':['Dashboard','overview'],marketplace:['Marketplace','discover on-chain tools'],tool:['Tool','detail & playground'],
  agent:['Agent terminal','autonomous agent over MCP'],graph:['Trust graph','the network'],
  publish:['Publish a tool','the publisher flow'],disputes:['Disputes','challenge & slash'],reputation:['Reputation','badges & leaderboard'],
  wallet:['Wallet','credits & balances'],activity:['Activity','on-chain feed'],vision:['Roadmap','the full vision']};

function kpiCard(tag,id,val,label,seed){return `<div class="kpi"><span class="tag ${tag}">${tag.toUpperCase()}</span><div class="v" id="${id}">${val}</div><div class="l up">${label}</div>${spark(seed)}</div>`;}

  <div class="grid g2" style="margin-top:16px">
    <div class="card"><div class="h"><span class="up">Network volume · 30d</span><span class="badge-soon">ILLUSTRATIVE</span></div>
      <div class="b" style="padding-bottom:8px">${lineChart(series(3,30,400,900),300,90,'rgba(63,185,80,.9)')}
        <div class="row" style="justify-content:space-between;margin-top:6px"><span class="hint">sample series</span><span class="hint" style="color:var(--live)">▲ 23% MoM</span></div></div></div>
    <div class="card"><div class="h"><span class="up">Revenue settled · 30d</span><span class="badge-soon">ILLUSTRATIVE</span></div>
      <div class="b" style="padding-bottom:8px">${lineChart(series(8,30,200,1200),300,90,'rgba(91,166,255,.9)')}
        <div class="row" style="justify-content:space-between;margin-top:6px"><span class="hint">sample series</span><span class="hint" style="color:var(--live)">▲ 31% MoM</span></div></div></div>
  </div>
  <div class="grid g2" style="margin-top:16px">
    <div class="card"><div class="h"><span class="up">Quick call</span><span class="badge-live"><span class="dot"></span>LIVE</span></div><div class="b">
      <div class="hint" style="margin-bottom:12px">Call the live tool as an agent would — one action runs lock → execute → Proof-of-Service → settle.</div>
      <div class="field"><input id="qcInput" placeholder="ask the tool something…" value="summarize the Q3 report"></div>
      <button class="btn-primary" onclick="doCall('qcInput','qcResult')">Call ${esc(focusTool)} ${svg('arrow',15)}</button>
      <div id="qcResult"></div>
    </div></div>
    <div class="card"><div class="h"><span class="up">Recent activity</span><a href="#/activity" style="color:var(--muted)">view all →</a></div>
      <div class="b"><div class="feed" id="dashFeed">${feedHTML(ACTIVITY.slice(0,5))}</div></div></div>
  </div>
  <div class="spread" style="margin:26px 0 14px"><h2 style="font-size:16px;margin:0">Featured tools</h2><a href="#/marketplace" class="hint">browse marketplace →</a></div>
  <div class="tools">${marketTools().slice(0,3).map(toolCard).join('')}</div>`,mount:updateLive};
}
function vMarketplace(param){
  const cat=param||'All';
  let list=marketTools().filter(t=>cat==='All'||t.cat===cat||(cat==='Live'&&t.live));
  return {html:`<div class="sub">Agents discover tools by verifiable on-chain reputation — no platform owner, no gatekeeper.</div>
  <div class="cat-row">
    <div class="search"><span class="si" data-ic="search"></span><input id="mktSearch" placeholder="search tools…" oninput="filterMarket()"></div>
    ${CATS.map(c=>`<div class="cat ${c===cat?'on':''}" onclick="go('marketplace/${c}')">${c}</div>`).join('')}
  </div>
  <div class="tools" id="mktGrid">${list.map(toolCard).join('')}</div>`,mount:paintAll};

  try{

}

function vGraph(){

  const agents=ACCOUNTS.filter(a=>a.name!=='val');
  const W=780,H=470,cx=W/2,cy=H/2,ring=165;
  const tierR={PLATINUM:11,GOLD:9,SILVER:7,BRONZE:5.5,NONE:4.5},tierC={PLATINUM:'#e6e6fa',GOLD:'#e8c46b',SILVER:'#cbd5e1',BRONZE:'#c08457',NONE:'rgba(255,255,255,.45)'};
  const tp=tools.map((t,i)=>{const a=(i/(tools.length||1))*Math.PI*2-Math.PI/2;return {t,x:cx+Math.cos(a)*ring,y:cy+Math.sin(a)*ring};});
  const ap=agents.map((a,i)=>{const an=(i/(agents.length||1))*Math.PI*2-Math.PI/2;return {a,x:cx+Math.cos(an)*(ring+88),y:cy+Math.sin(an)*(ring+88)};});
  const edges=ACTIVITY.filter(x=>x.type==='call'&&x.tool).slice(0,16).map(x=>{const t=tp.find(p=>p.t.id===x.tool);if(!t)return null;const a=ap[gh(x.account||'a')%(ap.length||1)]||{x:cx,y:cy};return {a,t};}).filter(Boolean);
  return {html:`<div class="sub">The trust graph — agents call tools, the chain settles &amp; governs. Node size = reputation, edges = recent calls. This network effect is the moat.</div>
  <div class="card"><div class="b" style="padding:0;overflow:hidden">
    <svg width="100%" viewBox="0 0 ${W} ${H}" style="display:block;background:radial-gradient(ellipse 50% 50% at center,rgba(255,255,255,.04),transparent 72%)">
      ${tp.map(p=>`<line x1="${cx}" y1="${cy}" x2="${p.x.toFixed(0)}" y2="${p.y.toFixed(0)}" stroke="rgba(255,255,255,.07)" stroke-width="1"/>`).join('')}
      ${edges.map((e,i)=>`<line x1="${e.a.x.toFixed(0)}" y1="${e.a.y.toFixed(0)}" x2="${e.t.x.toFixed(0)}" y2="${e.t.y.toFixed(0)}" stroke="rgba(91,166,255,.4)" stroke-width="1"><animate attributeName="stroke-opacity" values="0.06;0.55;0.06" dur="${(2+i%3)}s" repeatCount="indefinite"/></line>`).join('')}
      <circle cx="${cx}" cy="${cy}" r="24" fill="#0a0a0a" stroke="rgba(255,255,255,.5)" stroke-width="1.5"/><text x="${cx}" y="${cy+4}" text-anchor="middle" fill="#fff" font-size="10" font-family="monospace">CHAIN</text>
      ${ap.map(p=>`<circle cx="${p.x.toFixed(0)}" cy="${p.y.toFixed(0)}" r="6" fill="#000" stroke="rgba(91,166,255,.75)" stroke-width="1.5"/><text x="${p.x.toFixed(0)}" y="${(p.y+19).toFixed(0)}" text-anchor="middle" fill="var(--dim)" font-size="9">${esc(p.a.name)}</text>`).join('')}
      ${tp.map(p=>`<circle cx="${p.x.toFixed(0)}" cy="${p.y.toFixed(0)}" r="${tierR[p.t.tier]||5}" fill="${tierC[p.t.tier]||'#fff'}" opacity="0.92"/><text x="${p.x.toFixed(0)}" y="${(p.y-13).toFixed(0)}" text-anchor="middle" fill="#fff" font-size="8.5">${esc(p.t.id)}</text>`).join('')}
    </svg></div></div>
  <div class="row" style="margin-top:14px;gap:20px;flex-wrap:wrap"><span class="hint">${tp.length} tools · ${ap.length} agents · ${edges.length} live call-edges</span>
    <span class="row" style="gap:8px"><span class="tier PLATINUM">PLATINUM</span><span class="tier GOLD">GOLD</span><span class="tier SILVER">SILVER</span><span class="tier BRONZE">BRONZE</span><span class="hint">= node size</span></span></div>`,mount:paintAll};
}
const VIEWS={'':vDashboard,marketplace:vMarketplace,tool:vTool,agent:vAgent,graph:vGraph,publish:vPublish,disputes:vDisputes,reputation:vReputation,wallet:vWallet,activity:vActivity,vision:vVision};

// ================= router =================
function parseHash(){const h=(location.hash||'#/').replace(/^#\/?/,'');const [route,...rest]=h.split('/');return [route,rest.join('/')];}
function go(path){location.hash='#/'+path;el('sidebar').classList.remove('open');}
function paintAll(){paintIcons(el('view'));updateLive&&updateLive();}
function renderView(){
  const [route,param]=parseHash();
  document.querySelectorAll('#nav a').forEach(a=>a.classList.toggle('active',a.dataset.route===route));
  const [title,crumb]=TITLES[route]||TITLES[''];
  el('pageTitle').textContent=title;el('crumb').textContent=(param&&route==='tool')?param:crumb;
  const v=(VIEWS[route]||vDashboard)(param);
  el('view').className='route-anim';el('view').innerHTML=typeof v==='string'?v:v.html;
  paintIcons(el('view'));
  if(v&&v.mount)v.mount();
  window.scrollTo(0,0);
}

// ================= actions =================
let lastCall=null;
async function doCall(inputId,resultId){
  const input=el(inputId)?el(inputId).value:'';const r=el(resultId);
  if(r)r.innerHTML='<div class="result">calling… lock → execute → prove → settle</div>';
  try{const d=await post('call','input='+encodeURIComponent(input));
    if(d.ok){lastCall={input:d.input,model:d.model,output:d.output,receiptId:d.receiptId};
      if(r)r.innerHTML=`<div class="result"><span class="ok">✓ proven on-chain</span>
output:   ${esc(d.output)}
receipt:  ${esc(shortId(d.receiptId))}
paid:     ${esc(d.cost)} → ${esc(shortA(d.publisher))}
tx:       ${esc(d.txhash)}</div><button class="btn-sm" style="margin-top:8px" onclick='openReceipt(${JSON.stringify(d.receiptId)},${JSON.stringify(lastCall).replace(/'/g,"&#39;")})'>View receipt & verify</button>`;
      toast('Call settled','publisher paid '+d.cost,'ok');await loadActivity();}
    else{if(r)r.innerHTML=`<div class="result" style="color:var(--danger)">✗ ${esc(d.error||'failed')}</div>`;toast('Call failed',d.error||'','bad');}
  }catch(e){if(r)r.innerHTML=`<div class="result" style="color:var(--danger)">✗ ${esc(e)}</div>`;}
  await refresh();updateLive();
}
async function doAction(step,okTitle,icon,kind,extra){
  const btn=event&&event.currentTarget;const old=btn?btn.innerHTML:'';if(btn){btn.disabled=true;btn.textContent='…';}
  try{const d=await post(step,(extra||'').replace(/^&/,''));
    if(d.ok){toast(okTitle,d.note||'','ok');if(step==='resolve'&&d.slashAmount)toast('Bond slashed',fmt(d.slashAmount)+' restitution-routed','bad');await loadActivity();await loadTools();}
    else{toast(step+' failed',(d.tx&&d.tx.raw_log)||d.error||d.note||'','bad');}
  }catch(e){toast(step+' failed',String(e),'bad');}
  if(btn){btn.disabled=false;btn.innerHTML=old;}
  await refresh();renderView();
}
async function doNoProof(){
  const r=el('npResult');if(r)r.innerHTML='<div class="result">attempting…</div>';
  try{await post('lock');const d=await post('settle-noproof');
    if(d.rejected){if(r)r.innerHTML='<div class="result"><span class="ok">✓ rejected by the chain</span> — '+esc((d.tx&&d.tx.raw_log)||'proof-of-service verification failed')+'</div>';toast('Gate held','settlement without proof was rejected','ok');}
    else if(r)r.innerHTML='<div class="result" style="color:var(--danger)">⚠ not rejected</div>';
  }catch(e){if(r)r.innerHTML='<div class="result" style="color:var(--danger)">✗ '+esc(e)+'</div>';}
  await refresh();updateLive();
}

// ================= guided tour =================
const TOUR=[
  {route:'',sel:'#acctDD',title:'You are an agent',body:"Pick which funded account you act as. Open a second browser to be a different agent — they transact independently."},
  {route:'marketplace',sel:'#mktGrid',title:'A live marketplace',body:"On-chain tools ranked by verifiable reputation. No platform owner, no gatekeeper — agents discover by proof, not marketing."},
  {route:'tool/pubtool',sel:'#tdInput',title:'Call a tool',body:"One action runs the whole loop: lock credits → execute → Proof-of-Service → settle.",action:()=>doCall('tdInput','tdResult'),wait:1700},
  {route:'tool/pubtool',sel:'#tdResult',title:'Verifiable execution',body:"The agent pays only for PROVEN work — a BLAKE3 receipt anchored on-chain. That contingency is the trust unlock."},
  {route:'agent',sel:'#agTerm',title:'Autonomous agents',body:"A real AI agent over MCP discovers + calls tools with no human in the loop — the same protocol Claude Desktop speaks.",action:()=>runAgent(),wait:2700},
  {route:'disputes',sel:'#view',title:'Self-governing trust',body:"A bad call gets disputed; an upheld dispute slashes the publisher's bond (restitution-routed) and reputation erodes. The graph polices itself."},
  {route:'graph',sel:'svg',title:'The network effect',body:"Agents, tools, and the chain form a self-reinforcing trust graph. More good actors → more trust → more usage. That compounding is the moat."},
];
let tourI=0;
function startTour(){tourI=0;el('sidebar').classList.remove('open');showTour();}
async function showTour(){
  const step=TOUR[tourI];if(!step){endTour();return;}
  location.hash='#/'+step.route;
  await sleep(280);
  if(step.action){try{step.action();}catch(e){}await sleep(step.wait||1200);}
  const tgt=document.querySelector(step.sel)||el('view');
  if(tgt&&tgt.scrollIntoView)tgt.scrollIntoView({block:'center'});
  await sleep(140);spotlight(tgt,step);
}
function spotlight(tgt,step){
  let ov=el('tourOv');if(!ov){ov=document.createElement('div');ov.id='tourOv';document.body.appendChild(ov);}
  const r=tgt.getBoundingClientRect(),pad=8;
  const popTop=Math.min(r.bottom+12,window.innerHeight-200),popLeft=Math.max(12,Math.min(r.left,window.innerWidth-340));
  ov.innerHTML=`<div class="tour-hole" style="left:${r.left-pad}px;top:${r.top-pad}px;width:${r.width+pad*2}px;height:${r.height+pad*2}px"></div>
    <div class="tour-pop" style="left:${popLeft}px;top:${popTop}px">
      <div class="tour-step up">STEP ${tourI+1} / ${TOUR.length}</div><div class="tour-t">${esc(step.title)}</div><div class="tour-b">${step.body}</div>
      <div class="tour-nav"><button class="btn-sm" onclick="endTour()">Skip</button>
        <button class="btn-sm btn-primary" onclick="nextTour()">${tourI===TOUR.length-1?'Finish ✓':'Next →'}</button></div></div>`;
  ov.classList.add('show');
}
function nextTour(){tourI++;showTour();}
function endTour(){const ov=el('tourOv');if(ov)ov.classList.remove('show');tourI=0;toast('Tour complete',"that's the flywheel — explore freely",'ok');}

// ================= boot =================
async function boot(){
  await loadConfig();await loadAccounts();await Promise.all([loadTools(),loadActivity(),refresh()]);
  renderView();paintIcons(document);
  window.addEventListener('hashchange',renderView);
  document.addEventListener('click',closeAcctMenu);
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
  setInterval(async()=>{await Promise.all([refresh(),loadTools(),loadActivity()]);updateLive();},4000);
}
boot();
</script>

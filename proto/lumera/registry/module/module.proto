syntax = "proto3";

package lumera.registry.module;

import "cosmos/app/v1alpha1/module.proto";

option go_package = "x/registry/module;registrymodule";

// Module is the config object of the registry module.
message Module {
  option (cosmos.app.v1alpha1.module) = {
    go_import: "github.com/LumeraProtocol/lumera/x/registry"
  };

  // authority defines the custom module authority.
  // If not set, defaults to the governance module account.
  string authority = 1;
}

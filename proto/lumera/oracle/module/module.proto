syntax = "proto3";

package lumera.oracle.module;

import "cosmos/app/v1alpha1/module.proto";

option go_package = "x/oracle/module;oraclemodule";

// Module is the config object of the oracle module.
message Module {
  option (cosmos.app.v1alpha1.module) = {
    go_import: "github.com/LumeraProtocol/lumera/x/oracle"
  };

  // authority defines the custom module authority.
  // If not set, defaults to the governance module account.
  string authority = 1;
}

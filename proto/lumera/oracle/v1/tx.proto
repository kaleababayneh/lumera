syntax = "proto3";
package lumera.oracle.v1;

import "cosmos_proto/cosmos.proto";
import "cosmos/msg/v1/msg.proto";

option go_package = "x/oracle/types";

// Msg defines the oracle Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // InjectOracleVotes injects vote extension data into the state machine in a
  // deterministic way. This message is intended to be injected by the proposer
  // during PrepareProposal for use during FinalizeBlock transaction execution.
  rpc InjectOracleVotes(MsgInjectOracleVotes)
      returns (MsgInjectOracleVotesResponse);
}

// MsgInjectOracleVotes carries the previous height's oracle vote extensions.
message MsgInjectOracleVotes {
  option (cosmos.msg.v1.signer) = "authority";

  // authority is the governance module address (used as a deterministic signer
  // placeholder).
  string authority = 1 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];

  // height is the height the vote extensions correspond to (typically
  // req.Height-1).
  int64 height = 2;

  // votes are the raw vote extensions keyed by consensus validator address.
  repeated InjectedVoteExtension votes = 3;
}

message InjectedVoteExtension {
  // validator_address is the CometBFT validator address bytes (consensus
  // address).
  bytes validator_address = 1;

  // vote_extension is the raw vote extension payload.
  bytes vote_extension = 2;
}

message MsgInjectOracleVotesResponse {}

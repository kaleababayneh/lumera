syntax = "proto3";
package lumera.oracle.v1;

import "gogoproto/gogo.proto";
import "google/protobuf/timestamp.proto";
import "cosmos_proto/cosmos.proto";

option go_package = "x/oracle/types";

// PriceFeed represents a price feed for a specific asset pair
message PriceFeed {
  // asset_pair is the trading pair (e.g., "LAC/USD", "ETH/USD")
  string asset_pair = 1;

  // price is the current price in the quote currency
  // Represented as a decimal string to avoid precision loss; parsed with
  // sdkmath.LegacyNewDecFromStr in the keeper/validation layer.
  string price = 2;

  // volume_24h is the 24-hour trading volume (decimal string).
  string volume_24h = 3;

  // timestamp is when this price was last updated
  google.protobuf.Timestamp timestamp = 4
      [ (gogoproto.stdtime) = true, (gogoproto.nullable) = false ];

  // sources is a list of oracle sources that provided this price
  // (e.g., ["binance", "coinbase", "kraken"])
  repeated string sources = 5;

  // confidence_score is a measure of price reliability (0.0 to 1.0),
  // carried as a decimal string.
  string confidence_score = 6;
}

// ValidatorVote represents a validator's price vote in vote extensions
message ValidatorVote {
  // validator_address is the address of the voting validator
  string validator_address = 1
      [ (cosmos_proto.scalar) = "cosmos.AddressString" ];

  // price_feeds contains all price feeds submitted by this validator
  repeated PriceFeed price_feeds = 2;

  // block_height is the height at which this vote was submitted
  int64 block_height = 3;

  // timestamp is when this vote was created
  google.protobuf.Timestamp timestamp = 4
      [ (gogoproto.stdtime) = true, (gogoproto.nullable) = false ];
}

// AggregatedPrice represents consensus price after aggregating validator votes
message AggregatedPrice {
  // asset_pair is the trading pair
  string asset_pair = 1;

  // median_price is the median price from all validators (decimal string)
  string median_price = 2;

  // mean_price is the average price from all validators (decimal string)
  string mean_price = 3;

  // standard_deviation measures price agreement between validators
  // (decimal string)
  string standard_deviation = 4;

  // num_validators is how many validators voted for this price
  int32 num_validators = 5;

  // block_height is when this aggregation was computed
  int64 block_height = 6;

  // timestamp is when this aggregation was computed
  google.protobuf.Timestamp timestamp = 7
      [ (gogoproto.stdtime) = true, (gogoproto.nullable) = false ];
}

// Params defines the oracle module parameters
message Params {
  // vote_period is how often validators should submit price votes (in blocks)
  int64 vote_period = 1;

  // vote_threshold is the minimum number of validators required for consensus
  // (as a decimal fraction of total voting power, e.g., "0.67" for 2/3),
  // carried as a decimal string.
  string vote_threshold = 2;

  // max_price_deviation is the maximum allowed price deviation from median
  // before a validator's vote is considered an outlier (e.g., "0.10" for 10%),
  // carried as a decimal string.
  string max_price_deviation = 3;

  // asset_pairs is the list of trading pairs to track
  repeated string asset_pairs = 4;

  // max_vote_age is how old a vote can be before it's ignored (in seconds)
  int64 max_vote_age = 5;
}
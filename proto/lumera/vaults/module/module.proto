syntax = "proto3";

package lumera.vaults.module;

import "cosmos/app/v1alpha1/module.proto";

option go_package = "x/vaults/module;vaultsmodule";

// Module is the config object of the vaults module.
message Module {
  option (cosmos.app.v1alpha1.module) = {
    go_import: "github.com/LumeraProtocol/lumera/x/vaults"
  };
  string authority = 1;
}

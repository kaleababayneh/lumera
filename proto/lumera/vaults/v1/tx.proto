syntax = "proto3";

package lumera.vaults.v1;

import "cosmos/base/v1beta1/coin.proto";
import "cosmos_proto/cosmos.proto";
import "cosmos/msg/v1/msg.proto";
import "google/protobuf/timestamp.proto";
import "gogoproto/gogo.proto";
import "amino/amino.proto";
import "lumera/vaults/v1/vault.proto";

option go_package = "x/vaults/types";

service Msg {
  option (cosmos.msg.v1.service) = true;

  rpc CreateVault(MsgCreateVault) returns (MsgCreateVaultResponse);
}

message MsgCreateVault {
  option (cosmos.msg.v1.signer) = "owner";

  string owner = 1 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];
  string policy_id = 2;
  string tool_id = 3;
  string tier = 4;
  cosmos.base.v1beta1.Coin prepaid_amount = 5
      [ (gogoproto.nullable) = false, (amino.dont_omitempty) = true ];
  google.protobuf.Timestamp commitment_end_time = 6
      [ (gogoproto.stdtime) = true, (gogoproto.nullable) = false ];
  bool rollover_allowed = 7;
}

message MsgCreateVaultResponse { Vault vault = 1; }

syntax = "proto3";

package lumera.nft.v1;

import "cosmos/base/v1beta1/coin.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "google/protobuf/timestamp.proto";
import "lumera/nft/v1/toolpack.proto";
import "gogoproto/gogo.proto";
import "amino/amino.proto";

option go_package = "x/nft/types";

service Msg {
  rpc MintToolpack(MsgMintToolpack) returns (MsgMintToolpackResponse);
  rpc UpdateToolpack(MsgUpdateToolpack) returns (MsgUpdateToolpackResponse);
  rpc DeactivateToolpack(MsgDeactivateToolpack)
      returns (MsgDeactivateToolpackResponse);
  rpc RecordRoyaltyPayout(MsgRecordRoyaltyPayout)
      returns (MsgRecordRoyaltyPayoutResponse);
}

message MsgMintToolpack {
  option (cosmos.msg.v1.signer) = "curator";

  string curator = 1 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];
  string id = 2;
  repeated ToolReference tools = 3;
  string policy_version = 4;
  uint32 royalty_bps = 5;
  google.protobuf.Timestamp expires_at = 6 [(gogoproto.stdtime) = true];
}

message MsgMintToolpackResponse { ToolpackNFT toolpack = 1; }

message MsgUpdateToolpack {
  option (cosmos.msg.v1.signer) = "curator";

  string curator = 1 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];
  string id = 2;
  repeated ToolReference tools = 3;
  string policy_version = 4;
  uint32 royalty_bps = 5;
}

message MsgUpdateToolpackResponse { ToolpackNFT toolpack = 1; }

message MsgDeactivateToolpack {
  option (cosmos.msg.v1.signer) = "curator";

  string curator = 1 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];
  string id = 2;
}

message MsgDeactivateToolpackResponse { ToolpackNFT toolpack = 1; }

// MsgRecordRoyaltyPayout captures royalties paid during settlement (module
// internal).
message MsgRecordRoyaltyPayout {
  option (cosmos.msg.v1.signer) = "authority";

  string authority = 1 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];
  string toolpack_id = 2;
  cosmos.base.v1beta1.Coin amount = 3 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
}

message MsgRecordRoyaltyPayoutResponse {}

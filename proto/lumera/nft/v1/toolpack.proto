syntax = "proto3";

package lumera.nft.v1;

import "google/protobuf/timestamp.proto";
import "gogoproto/gogo.proto";

option go_package = "x/nft/types";

// ToolReference pins a ToolCard and version inside a Toolpack NFT.
message ToolReference {
  string tool_id = 1;
  string version = 2;
}

// ToolpackNFT describes a curated Toolpack minted as an on-chain NFT.
message ToolpackNFT {
  string id = 1;
  uint64 version = 2;
  string curator = 3;
  repeated ToolReference tools = 4;
  string policy_version = 5;
  uint32 royalty_bps = 6;
  bool active = 7;
  google.protobuf.Timestamp created_at = 8 [(gogoproto.stdtime) = true];
  google.protobuf.Timestamp updated_at = 9 [(gogoproto.stdtime) = true];
  google.protobuf.Timestamp expires_at = 10 [(gogoproto.stdtime) = true];
}

// ToolpackHistory keeps track of immutable historical versions.
message ToolpackHistory {
  string id = 1;
  uint64 version = 2;
  repeated ToolReference tools = 3;
  string policy_version = 4;
  uint32 royalty_bps = 5;
  google.protobuf.Timestamp created_at = 6 [(gogoproto.stdtime) = true];
  string curator = 7;
  google.protobuf.Timestamp expires_at = 8 [(gogoproto.stdtime) = true];
}

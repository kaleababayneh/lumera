syntax = "proto3";

package lumera.passport.module;

import "cosmos/app/v1alpha1/module.proto";

option go_package = "x/passport/module;passportmodule";

// Module is the config object of the passport module.
message Module {
  option (cosmos.app.v1alpha1.module) = {
    go_import: "github.com/LumeraProtocol/lumera/x/passport"
  };
  string authority = 1;
}

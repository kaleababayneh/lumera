syntax = "proto3";

package lumera.incentives.module;

import "cosmos/app/v1alpha1/module.proto";

option go_package = "x/incentives/module;incentivesmodule";

// Module is the config object of the incentives module.
message Module {
  option (cosmos.app.v1alpha1.module) = {
    go_import: "github.com/LumeraProtocol/lumera/x/incentives"
  };

  // authority defines the custom module authority.
  // If not set, defaults to the governance module account.
  string authority = 1;
}

syntax = "proto3";

package lumera.insurance.module;

import "cosmos/app/v1alpha1/module.proto";

option go_package = "x/insurance/module;insurancemodule";

// Module is the config object of the insurance module.
message Module {
  option (cosmos.app.v1alpha1.module) = {
    go_import: "github.com/LumeraProtocol/lumera/x/insurance"
  };

  // authority defines the custom module authority.
  // If not set, defaults to the governance module account.
  string authority = 1;
}

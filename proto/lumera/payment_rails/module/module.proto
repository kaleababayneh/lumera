syntax = "proto3";

package lumera.payment_rails.module;

import "cosmos/app/v1alpha1/module.proto";

option go_package = "x/payment_rails/module;paymentrailsmodule";

// Module is the config object of the payment_rails module.
message Module {
  option (cosmos.app.v1alpha1.module) = {
    go_import: "github.com/LumeraProtocol/lumera/x/payment_rails"
  };
  string authority = 1;
}

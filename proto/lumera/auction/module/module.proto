syntax = "proto3";

package lumera.auction.module;

import "cosmos/app/v1alpha1/module.proto";

option go_package = "x/auction/module;auctionmodule";

// Module is the config object of the auction module.
message Module {
  option (cosmos.app.v1alpha1.module) = {
    go_import: "github.com/LumeraProtocol/lumera/x/auction"
  };
  string authority = 1;
}

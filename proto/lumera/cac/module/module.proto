syntax = "proto3";

package lumera.cac.module;

import "cosmos/app/v1alpha1/module.proto";

option go_package = "x/cac/module;cacmodule";

// Module is the config object of the cac module.
message Module {
  option (cosmos.app.v1alpha1.module) = {
    go_import: "github.com/LumeraProtocol/lumera/x/cac"
  };
  string authority = 1;
}

syntax = "proto3";

package lumera.workflows.module;

import "cosmos/app/v1alpha1/module.proto";

option go_package = "x/workflows/module;workflowsmodule";

// Module is the config object of the workflows module.
message Module {
  option (cosmos.app.v1alpha1.module) = {
    go_import: "github.com/LumeraProtocol/lumera/x/workflows"
  };
  string authority = 1;
}
